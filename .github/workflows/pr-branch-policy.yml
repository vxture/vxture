name: PR Branch Policy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: pr-branch-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  branch-policy:
    name: Enforce Branch Flow
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source and target
        shell: bash
        run: |
          set -euo pipefail

          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"

          echo "HEAD=$HEAD"
          echo "BASE=$BASE"

          if [[ "$BASE" == "develop" ]]; then
            if [[ "$HEAD" =~ ^(feature|fix|refactor|docs|chore)/[a-z0-9][a-z0-9-]*$ ]]; then
              echo "::notice::develop 只接受工作分支，合并按钮必须使用 Squash merge。"
              exit 0
            fi
            echo "::error::develop 只接受 feature/fix/refactor/docs/chore 工作分支；禁止主干或 sync 分支直接回灌。"
            exit 1
          fi

          if [[ "$BASE" == "beta" ]]; then
            if [[ "$HEAD" == "develop" ]]; then
              echo "::notice::beta 只接受 develop 晋升；晋升 PR 仅用于评审和 CI，最终必须由 fast-forward promotion 执行。"
              exit 0
            fi
            echo "::error::beta 只接受 develop 晋升；禁止工作分支、main 或 sync 分支直接进入。"
            exit 1
          fi

          if [[ "$BASE" == "main" ]]; then
            if [[ "$HEAD" == "beta" ]]; then
              echo "::notice::main 只接受 beta 晋升；晋升 PR 仅用于评审和 CI，最终必须由 fast-forward promotion 执行。"
              exit 0
            fi
            if [[ "$HEAD" =~ ^hotfix/[a-z0-9][a-z0-9-]*$ ]]; then
              echo "::notice::main 允许 hotfix/* 紧急修复；完成后必须补同等修复回 develop 并恢复标准晋升链路。"
              exit 0
            fi
            echo "::error::main 只接受 beta 晋升；紧急生产修复仅允许 hotfix/*；禁止 sync 分支直接进入。"
            exit 1
          fi

          echo "::error::不支持的 PR 目标分支：$BASE。请使用 develop、beta 或 main。"
          exit 1
