name: Deploy worker-01

# Docker Build & Push 全部成功后自动触发
on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to worker-01
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WORKER01_HOST }}
          username: ${{ secrets.WORKER01_USER }}
          key: ${{ secrets.WORKER01_SSH_KEY }}
          script: |
            set -e

            # 1. 同步最新配置
            git -C /srv/vxture/repo pull

            # 2. 拉取新镜像并滚动重启平台栈
            cd /srv/vxture/repo/deploy/worker-01
            docker compose -f compose.platform.yml pull
            docker compose -f compose.platform.yml up -d

            # 3. 输出最终状态
            docker compose -f compose.platform.yml ps
