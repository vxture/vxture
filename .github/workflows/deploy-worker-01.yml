name: Deploy worker-01

# Automatically deploy worker-01 after all Docker images are built successfully.
on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to worker-01
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout deploy files
        uses: actions/checkout@v4

      - name: Upload worker-01 deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WORKER01_HOST }}
          username: ${{ secrets.WORKER01_USER }}
          key: ${{ secrets.WORKER01_SSH_KEY }}
          source: "deploy/worker-01/compose.platform.yml,deploy/worker-01/compose.nginx.yml,deploy/worker-01/scripts"
          target: "/tmp/vxture-worker-01-deploy"
          rm: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WORKER01_HOST }}
          username: ${{ secrets.WORKER01_USER }}
          key: ${{ secrets.WORKER01_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e

            # Sync compose/scripts uploaded by GitHub Actions. No server-side git pull.
            DEPLOY_DIR=/srv/vxture/repo/deploy/worker-01
            mkdir -p "$DEPLOY_DIR"
            cp -f /tmp/vxture-worker-01-deploy/deploy/worker-01/compose.platform.yml "$DEPLOY_DIR/compose.platform.yml"
            cp -f /tmp/vxture-worker-01-deploy/deploy/worker-01/compose.nginx.yml "$DEPLOY_DIR/compose.nginx.yml"
            rm -rf "$DEPLOY_DIR/scripts"
            cp -R /tmp/vxture-worker-01-deploy/deploy/worker-01/scripts "$DEPLOY_DIR/scripts"

            # Optional GHCR login for private packages.
            if [ -n "${{ secrets.WORKER01_GHCR_USERNAME }}" ] && [ -n "${{ secrets.WORKER01_GHCR_TOKEN }}" ]; then
              echo "${{ secrets.WORKER01_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.WORKER01_GHCR_USERNAME }}" --password-stdin
            fi

            # Pull new images and restart the platform stack.
            cd "$DEPLOY_DIR"
            COMPOSE_PARALLEL_LIMIT=1 docker compose -f compose.platform.yml pull
            docker compose -f compose.platform.yml up -d

            docker compose -f compose.platform.yml ps
