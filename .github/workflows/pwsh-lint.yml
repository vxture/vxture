name: PowerShell Lint

on:
  push:
    paths:
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'scripts/**'

jobs:
  ps-lint:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PowerShell on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Setup PowerShell on macOS
        if: runner.os == 'macOS'
        run: |
          brew install --cask powershell

      - name: Ensure PowerShell on Windows
        if: runner.os == 'Windows'
        # windows-latest 通常已包含 pwsh；仅做版本输出为证明
        shell: pwsh
        run: |
          pwsh -v

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber

      - name: Run PSScriptAnalyzer lint
        shell: pwsh
        run: |
          Write-Host "Running PSScriptAnalyzer against ./scripts"
          $results = Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Warning,Error
          if ($null -ne $results -and $results.Count -gt 0) {
            Write-Host "PSScriptAnalyzer found issues:"
            $results | Format-Table -AutoSize
            exit 1
          } else {
            Write-Host "PSScriptAnalyzer: no issues found."
          }

      # platform setup moved earlier to avoid depending on Marketplace action
