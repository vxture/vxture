name: SonarQube

on:
  push:
    branches: [main, beta, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared & core packages
        run: pnpm build:backend-deps

      - name: Install coverage provider
        working-directory: services/ai/gateway
        run: pnpm add -D @vitest/coverage-v8 --ignore-workspace-root-check

      - name: Run tests with coverage
        run: pnpm --filter @vxture/service-ai-gateway test:coverage

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
