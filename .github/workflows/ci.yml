name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - beta
      - develop
      - "fix/**"
      - "refactor/**"
      - "feature/**"
      - "merge/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Format ──────────────────────────────────────────────────────────────
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

  # ── 2. Audit ───────────────────────────────────────────────────────────────
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails on critical vulnerabilities; high-severity issues are tracked
      # separately until upstream packages release patches.
      - name: Dependency security audit
        run: pnpm audit --audit-level=critical

  # ── 3. Check (type · lint · guardrail · boundaries) ───────────────────────
  check:
    # 该名称被 main ruleset 作为 required status check 引用；改名必须同步更新仓库 ruleset。
    name: Type Check · Lint · Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared & core packages
        run: pnpm build:backend-deps

      - name: Generate Prisma clients
        run: |
          pnpm --filter @vxture/service-ai-gateway db:generate
          pnpm --filter @vxture/agent-server-vela prisma:generate

      - name: Type check
        run: pnpm type-check:all

      - name: Lint
        run: pnpm --recursive --if-present lint

      - name: Design system guardrail
        run: pnpm lint:design

      - name: Package boundary check
        run: pnpm lint:boundaries

  # ── 4. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared & core packages
        run: pnpm build:backend-deps

      - name: Generate Prisma clients
        run: |
          pnpm --filter @vxture/service-ai-gateway db:generate
          pnpm --filter @vxture/agent-server-vela prisma:generate

      - name: Build AI Gateway service
        run: pnpm --filter @vxture/service-ai-gateway build

      - name: Build Vela agent server
        run: pnpm --filter @vxture/agent-server-vela build

  # ── 5. Test · Coverage ─────────────────────────────────────────────────────
  test:
    name: Test · Coverage
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared & core packages
        run: pnpm build:backend-deps

      - name: Generate Prisma clients
        run: |
          pnpm --filter @vxture/service-ai-gateway db:generate
          pnpm --filter @vxture/agent-server-vela prisma:generate

      - name: Install coverage provider
        working-directory: services/ai/gateway
        run: pnpm add -D "@vitest/coverage-v8@^3.2.4" --ignore-workspace-root-check

      - name: Run tests
        run: pnpm --recursive --if-present test

      - name: Generate coverage report
        run: pnpm --filter @vxture/service-ai-gateway test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: services/ai/gateway/coverage/lcov.info
          retention-days: 1

  # ── 6. SonarQube ───────────────────────────────────────────────────────────
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [test]
    if: >
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/beta' ||
      github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: services/ai/gateway/coverage/

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
