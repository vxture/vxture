name: CI

# Trigger: push or PR to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and checks (frontend + optional backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts'

      - name: Install pnpm (via corepack)
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Workspace type-check
        run: pnpm -w -r type-check

      - name: Run lint
        run: pnpm -w -r lint

      - name: 'Frontend: type-check (web)'
        run: pnpm --filter web type-check

      - name: (Optional) Setup Python for backend checks
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: (Optional) Install backend deps
        run: |
          if [ -d packages/api ]; then
            cd packages/api
            python -m venv .venv
            . .venv/bin/activate
            pip install -r requirements.txt || true
          else
            echo "no backend"
          fi

      - name: (Optional) Run backend tests
        run: |
          if [ -d packages/api ]; then
            cd packages/api
            . .venv/bin/activate
            if [ -f pytest.ini ] || ls tests 1> /dev/null 2>&1; then
              pytest -q || true
            else
              echo "No backend tests found"
            fi
          else
            echo "no backend"
          fi
