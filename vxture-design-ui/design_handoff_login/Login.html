/* ─── Tweaks defaults ─────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

/* ─── Node Graph Canvas ───────────────────────────── */
function NodeGraph({ accent, light }) {
 const ref = React.useRef(null);
 const mouse = React.useRef({ x: -999, y: -999 });
 const anim = React.useRef(null);

 React.useEffect(() => {
 const c = ref.current; if (!c) return;
 const ctx = c.getContext('2d');
 let W, H, nodes;

 const toRgb = hex => {
 const h = hex.replace('#','');
 return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
 };
 const [r,g,b] = toRgb(accent || '#2563eb');

 function resize() {
 W = c.offsetWidth; H = c.offsetHeight;
 c.width = W; c.height = H; init();
 }
 function init() {
 const n = Math.floor(W * H / 9000);
 nodes = Array.from({length: n}, () => ({
 x: Math.random()*W, y: Math.random()*H,
 vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
 r: Math.random()*1.8+.6,
 p: Math.random()*Math.PI*2}));
 }
 function draw() {
 ctx.clearRect(0,0,W,H);
 const mx = mouse.current.x, my = mouse.current.y;
 nodes.forEach(n => {
 n.p += .014; n.x += n.vx; n.y += n.vy;
 if (n.x<0||n.x>W) n.vx*=-1;
 if (n.y<0||n.y>H) n.vy*=-1;
 const dx=n.x-mx, dy=n.y-my, d=Math.sqrt(dx*dx+dy*dy);
 if (d<100) { n.x+=dx/d*.5; n.y+=dy/d*.5; }
 });
 const D=140;
 for (let i=0;i<nodes.length;i++) {
 for (let j=i+1;j<nodes.length;j++) {
 const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
 const d=Math.sqrt(dx*dx+dy*dy);
 if (d<D) {
 const a=(1-d/D)*(light?.35:.22);
 ctx.beginPath();
 ctx.moveTo(nodes[i].x,nodes[i].y);
 ctx.lineTo(nodes[j].x,nodes[j].y);
 ctx.strokeStyle=`rgba(${r},${g},${b},${a})`;
 ctx.lineWidth=.6; ctx.stroke();
 }
 }
 }
 nodes.forEach(n=>{
 const pv=(Math.sin(n.p)*.5+.5);
 ctx.beginPath();
 ctx.arc(n.x,n.y,n.r*(1+pv*.35),0,Math.PI*2);
 ctx.fillStyle=`rgba(${r},${g},${b},${light ? .45+pv*.4 : .5+pv*.45})`;
 ctx.fill();
 });
 anim.current=requestAnimationFrame(draw);
 }
 resize();
 window.addEventListener('resize', resize);
 c.parentElement?.addEventListener('mousemove', e=>{
 const rect=c.getBoundingClientRect();
 mouse.current={x:e.clientX-rect.left, y:e.clientY-rect.top};
 });
 anim.current=requestAnimationFrame(draw);
 return ()=>{ cancelAnimationFrame(anim.current); window.removeEventListener('resize',resize); };
 }, [accent]);

 return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%'}} />;
}

/* ─── Field ───────────────────────────────────────── */
function Field({ label, type, placeholder, value, onChange, error, autoFocus, hint }) {

 <div style={{marginBottom:20}}>

 letterSpacing:'.12em', textTransform:'uppercase',
 color: focused ? 'var(--accent)' : 'var(--text-secondary)',
 marginBottom:7, transition:'color .2s'}}>{label}</label>
 <input
 type={type} value={value}
 onChange={e=>onChange(e.target.value)}
 onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
 autoFocus={autoFocus} placeholder={placeholder}
 style={{
 width:'100%', padding:'11px 14px',
 background: focused ? 'rgba(37,99,235,.05)' : '#f8faff',
 border:`1px solid ${error?'var(--error)':focused?'var(--border-active)':'var(--border)'}`,
 borderRadius:8, color:'var(--text-primary)',
 fontFamily:'var(--font-ui)', fontSize:14, outline:'none',
 transition:'all .2s',
 boxShadow: focused ? `0 0 0 3px ${error?'rgba(239,68,68,.12)':'rgba(37,99,235,.12)'}` : 'none'}}
 />
 {error && <p style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--error)',marginTop:5}}>{error}</p>}
 {hint && !error && <p style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)',marginTop:5}}>{hint}</p>}
 </div>
 );
}

/* ─── Slider Captcha ─────────────────────────────── */
function SliderCaptcha({ accent, onSuccess, onClose }) {
 const bgRef = React.useRef(null);
 const pieceRef = React.useRef(null);
 const [dragging, setDragging] = React.useState(false);
 const [offset, setOffset] = React.useState(0);
 const [status, setStatus] = React.useState('idle'); // idle|success|fail
 const targetRef = React.useRef(0);
 const startXRef = React.useRef(0);
 const TRACK_W = 300;
 const PIECE_W = 42;
 const PIECE_H = 42;
 const CANVAS_H = 120;
 const TOLERANCE = 6;

 // Regenerate puzzle each mount
 React.useEffect(() => { generate(); }, []);

 function generate() {
 setOffset(0); setStatus('idle');
 const target = 60 + Math.floor(Math.random() * (TRACK_W - PIECE_W - 80));
 targetRef.current = target;
 drawBg(target);
 drawPiece(target);
 }

 function drawBg(target) {
 const c = bgRef.current; if (!c) return;
 const ctx = c.getContext('2d');
 c.width = TRACK_W; c.height = CANVAS_H;
 // Background pattern
 const grad = ctx.createLinearGradient(0,0,TRACK_W,CANVAS_H);
 grad.addColorStop(0,'#dbeafe'); grad.addColorStop(1,'#bfdbfe');
 ctx.fillStyle = grad; ctx.fillRect(0,0,TRACK_W,CANVAS_H);
 // Decorative circles
 [[60,40,30,'rgba(37,99,235,.1)'],[200,70,20,'rgba(37,99,235,.08)'],[260,30,15,'rgba(37,99,235,.12)']].forEach(([x,y,r,c2])=>{
 ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=c2; ctx.fill();
 });
 // Grid lines
 ctx.strokeStyle='rgba(37,99,235,.06)'; ctx.lineWidth=1;
 for(let x=0;x<TRACK_W;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CANVAS_H);ctx.stroke();}
 for(let y=0;y<CANVAS_H;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(TRACK_W,y);ctx.stroke();}
 // Puzzle hole
 const px = target, py = (CANVAS_H-PIECE_H)/2;
 ctx.save();
 puzzlePath(ctx, px, py, PIECE_W, PIECE_H);
 ctx.fillStyle='rgba(0,0,0,.18)'; ctx.fill();
 ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.5; ctx.stroke();
 ctx.restore();
 }

 function drawPiece(target) {
 const c = pieceRef.current; if (!c) return;
 const ctx = c.getContext('2d');
 c.width = PIECE_W; c.height = PIECE_H;
 // Clip to puzzle shape
 ctx.save();
 puzzlePath(ctx,0,0,PIECE_W,PIECE_H);
 ctx.clip();
 // Fill with matching pattern
 const grad = ctx.createLinearGradient(0,0,PIECE_W,PIECE_H);
 grad.addColorStop(0,'#93c5fd'); grad.addColorStop(1,'#60a5fa');
 ctx.fillStyle=grad; ctx.fillRect(0,0,PIECE_W,PIECE_H);
 // Grid
 ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=1;
 for(let x=0;x<PIECE_W;x+=10){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,PIECE_H);ctx.stroke();}
 for(let y=0;y<PIECE_H;y+=10){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(PIECE_W,y);ctx.stroke();}
 ctx.restore();
 // Border
 puzzlePath(ctx,0,0,PIECE_W,PIECE_H);
 ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.lineWidth=1.5; ctx.stroke();
 }

 function puzzlePath(ctx, x, y, w, h) {
 const r = 6, bumpR = 7, bumpY = y + h/2;
 ctx.beginPath();
 ctx.moveTo(x+r, y);
 ctx.lineTo(x+w-r, y);
 ctx.quadraticCurveTo(x+w, y, x+w, y+r);
 // Right bump out
 ctx.lineTo(x+w, bumpY-bumpR);
 ctx.arc(x+w+bumpR, bumpY, bumpR, Math.PI, 0, true);
 ctx.lineTo(x+w, bumpY+bumpR);
 ctx.lineTo(x+w, y+h-r);
 ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
 ctx.lineTo(x+r, y+h);
 ctx.quadraticCurveTo(x, y+h, x, y+h-r);
 ctx.lineTo(x, y+r);
 ctx.quadraticCurveTo(x, y, x+r, y);
 ctx.closePath();
 }

 const pieceY = (CANVAS_H - PIECE_H) / 2;
 const maxOffset = TRACK_W - PIECE_W;

 function onMouseDown(e) {
 if (status !== 'idle') return;
 e.preventDefault();
 setDragging(true);
 startXRef.current = (e.touches?.[0]?.clientX ?? e.clientX) - offset;
 const onMove = ev => {
 const cx = ev.touches?.[0]?.clientX ?? ev.clientX;
 const next = Math.max(0, Math.min(maxOffset, cx - startXRef.current));
 setOffset(next);
 };
 const onUp = ev => {
 setDragging(false);
 window.removeEventListener('mousemove', onMove);
 window.removeEventListener('mouseup', onUp);
 window.removeEventListener('touchmove', onMove);
 window.removeEventListener('touchend', onUp);
 const cx = ev.touches?.[0]?.clientX ?? ev.changedTouches?.[0]?.clientX ?? ev.clientX;
 const final = Math.max(0, Math.min(maxOffset, cx - startXRef.current));
 const diff = Math.abs(final - targetRef.current);
 if (diff <= TOLERANCE) {
 setStatus('success');
 setTimeout(onSuccess, 600);
 } else {
 setStatus('fail');
 setTimeout(()=>{ generate(); }, 1000);
 }
 };
 window.addEventListener('mousemove', onMove);
 window.addEventListener('mouseup', onUp);
 window.addEventListener('touchmove', onMove, {passive:true});
 window.addEventListener('touchend', onUp);
 }

 const trackColor = status==='success'?'#10b981': status==='fail'?'#ef4444': accent;
 const btnBg = status==='success'?'#10b981': status==='fail'?'#ef4444': '#fff';
 const btnIcon = status==='success'?'✓': status==='fail'?'✕': '›';

 return (
 <div style={{background:'rgba(0,0,0,.45)',position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn .2s ease'}}>
 <div style={{background:'#fff',borderRadius:14,padding:'24px',width:348,boxShadow:'0 20px 60px rgba(0,0,0,.2)',position:'relative'}}>
 {/* Close */}
 <button onClick={onClose} style={{position:'absolute',top:12,right:12,background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',fontSize:16,lineHeight:1,padding:4,borderRadius:4,transition:'color .2s'}}
 onMouseEnter={e=>e.target.style.color='var(--text-primary)'}
 onMouseLeave={e=>e.target.style.color='var(--text-muted)'}>✕</button>

 <p style={{fontSize:13,fontWeight:600,color:'var(--text-primary)',marginBottom:12}}>请完成安全验证</p>
 <p style={{fontSize:12,color:'var(--text-secondary)',marginBottom:14}}>拖动滑块，将拼图移至缺口处</p>

 {/* Puzzle canvas */}
 <div style={{position:'relative',width:TRACK_W,height:CANVAS_H,borderRadius:8,overflow:'hidden',border:'1px solid var(--border)',marginBottom:14,userSelect:'none'}}>
 <canvas ref={bgRef} style={{display:'block'}} />
 {/* Floating piece */}
 <canvas ref={pieceRef} style={{position:'absolute',top:pieceY,left:offset,cursor:dragging?'grabbing':'grab',filter:`drop-shadow(0 2px 6px rgba(0,0,0,.25))`,transition:dragging?'none':'left .1s'}} onMouseDown={onMouseDown} onTouchStart={onMouseDown} />
 </div>

 {/* Slider track */}
 <div style={{position:'relative',height:40,background:'#f0f7ff',borderRadius:20,border:'1px solid var(--border)',overflow:'hidden'}}>
 {/* Fill */}
 <div style={{position:'absolute',left:0,top:0,bottom:0,width:offset+20,background:`linear-gradient(90deg,${trackColor}22,${trackColor}44)`,borderRadius:20,transition:dragging?'none':'width .1s'}} />
 {/* Label */}
 <span style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,color:status!=='idle'?trackColor:'var(--text-muted)',pointerEvents:'none',fontWeight:status!=='idle'?600:400,transition:'color .3s'}}>
 {status==='success'?'验证成功': status==='fail'?'验证失败，请重试': '按住滑块，拖动到右侧'}
 </span>
 {/* Handle */}
 <div onMouseDown={onMouseDown} onTouchStart={onMouseDown}
 style={{position:'absolute',top:3,left:offset,width:34,height:34,borderRadius:'50%',background:btnBg,border:`2px solid ${status==='idle'?'rgba(37,99,235,.2)':trackColor}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:dragging?'grabbing':'grab',fontSize:status==='idle'?18:14,color:status==='idle'?accent:btnBg==='#fff'?accent:'white',boxShadow:'0 2px 8px rgba(0,0,0,.15)',transition:dragging?'none':'all .2s',userSelect:'none',fontWeight:700}}>
 {btnIcon}
 </div>
 </div>

 {/* Refresh */}
 {status!=='success' && (
 <button onClick={generate} style={{marginTop:10,background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:4,transition:'color .2s'}}
 onMouseEnter={e=>e.currentTarget.style.color=accent}
 onMouseLeave={e=>e.currentTarget.style.color='var(--text-muted)'}>
 ↺ 刷新验证码
 </button>
 )}
 </div>
 </div>
 );
}

/* ─── Forgot Password ─────────────────────────────── */
function ForgotScreen({ email, setEmail, onBack, accent }) {
 const [sent, setSent] = React.useState(false);
 const [loading, setLoading] = React.useState(false);
 function submit(e) { e.preventDefault(); setLoading(true); setTimeout(()=>{setLoading(false);setSent(true);},1200); }
 return (
 <div style={{ }}>
 <button onClick={onBack} style={{
 background:'none',border:'none',cursor:'pointer',
 color:'var(--text-muted)',fontFamily:'var(--font-mono)',fontSize:10,
 letterSpacing:'.08em',display:'flex',alignItems:'center',gap:5,
 marginBottom:28,padding:0,transition:'color .2s'}}
 onMouseEnter={e=>e.currentTarget.style.color='var(--accent)'}
 onMouseLeave={e=>e.currentTarget.style.color='var(--text-muted)'}
 >← BACK TO SIGN IN</button>
 {!sent ? <>
 <h2 style={{fontFamily:'var(--font-display)',fontSize:22,fontWeight:800,letterSpacing:'-.02em',marginBottom:8}}>Reset your password</h2>
 <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:28,lineHeight:1.65}}>Enter your email and we'll send a secure reset link.</p>
 <form onSubmit={submit}>
 <Field label="Email" type="email" placeholder="you@company.com" value={email} onChange={setEmail} autoFocus />
 <PrimaryButton loading={loading} label="Send reset link" loadingLabel="Sending..." accent={accent} />
 </form>
 </> : (
 <div style={{textAlign:'center',padding:'20px 0'}}>
 <div style={{width:52,height:52,borderRadius:'50%',background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.3)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',color:'var(--success)',fontSize:20}}>✓</div>
 <h3 style={{fontFamily:'var(--font-display)',fontSize:18,fontWeight:700,marginBottom:8}}>Check your inbox</h3>
 <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.65}}>
 Reset link sent to <strong style={{color:'var(--text-primary)'}}>{email||'your email'}</strong>.<br/>Expires in 15 minutes.
 </p>
 <button onClick={onBack} style={{marginTop:24,background:'none',border:'1px solid var(--border)',borderRadius:7,padding:'9px 20px',color:'var(--text-secondary)',fontFamily:'var(--font-ui)',fontSize:13,cursor:'pointer',transition:'all .2s'}}
 onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.color='var(--accent)';}}
 onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-secondary)';}}>
 Back to sign in
 </button>
 </div>
 )}
 </div>
 );
}

/* ─── Primary Button ──────────────────────────────── */
function PrimaryButton({ loading, label, loadingLabel, accent }) {
 const rgb = accent.replace('#','');
 const r=parseInt(rgb.slice(0,2),16), g=parseInt(rgb.slice(2,4),16), b=parseInt(rgb.slice(4,6),16);
 return (
 <button type="submit" disabled={loading} style={{
 width:'100%',padding:'13px',
 background: loading ? `rgba(${r},${g},${b},.5)` : accent,
 border:'none',borderRadius:8,color:'white',
 fontFamily:'var(--font-ui)',fontSize:14,fontWeight:600,
 cursor: loading?'not-allowed':'pointer',
 transition:'all .2s',
 boxShadow: loading?'none':`0 4px 20px rgba(${r},${g},${b},.3)`,
 display:'flex',alignItems:'center',justifyContent:'center',gap:8}}
 onMouseEnter={e=>{ if(!loading){e.currentTarget.style.boxShadow=`0 6px 28px rgba(${r},${g},${b},.45)`;e.currentTarget.style.transform='translateY(-1px)';} }}
 onMouseLeave={e=>{ e.currentTarget.style.boxShadow=`0 4px 20px rgba(${r},${g},${b},.3)`;e.currentTarget.style.transform='translateY(0)'; }}
 >
 {loading ? <><Spinner />{loadingLabel}</> : label}
 </button>
 );
}

/* ─── Dashboard teaser ────────────────────────────── */
function Dashboard({ accent, onLogout, showNodeGraph }) {
 const rgb = accent.replace('#','');
 const r=parseInt(rgb.slice(0,2),16), g=parseInt(rgb.slice(2,4),16), b=parseInt(rgb.slice(4,6),16);
 return (
 <div style={{display:'flex',flexDirection:'column',height:'100%',animation:'fadeIn .5s ease both'}}>
 <Header accent={accent} />
 <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden',background:'var(--bg)'}}>
 {showNodeGraph && <NodeGraph accent={accent} light />}
 <div style={{position:'relative',zIndex:2,textAlign:'center'}}>
 <div style={{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:'.18em',color:accent,textTransform:'uppercase',marginBottom:14}}>Authentication successful</div>
 <h1 style={{fontFamily:'var(--font-display)',fontSize:32,fontWeight:800,letterSpacing:'-.03em',marginBottom:10,color:'var(--text-primary)'}}>Welcome to vxture</h1>
 <p style={{fontSize:14,color:'var(--text-secondary)'}}>Your workspace is loading…</p>
 <div style={{display:'flex',gap:6,justifyContent:'center',marginTop:20}}>
 {[0,1,2].map(i=>(
 <div key={i} style={{width:6,height:6,borderRadius:'50%',background:accent,animation:`pulse 1.2s ${i*.2}s ease-in-out infinite`}} />
 ))}
 </div>
 <button onClick={onLogout} style={{marginTop:32,background:'none',border:`1px solid rgba(${r},${g},${b},.3)`,borderRadius:7,padding:'9px 20px',color:accent,fontFamily:'var(--font-ui)',fontSize:13,cursor:'pointer'}}>
 Sign out
 </button>
 </div>
 </div>
 <Footer />
 </div>
 );
}

/* ─── Header ──────────────────────────────────────── */
function Header({ accent }) {
 return (
 <header style={{
 height:'var(--header-h)', flexShrink:0,
 background:'transparent',
 borderBottom:'none',
 position:'relative',zIndex:10,
 display:'flex', alignItems:'center',
 padding:'0 40px',
 position:'relative', zIndex:10}}>
 <div style={{display:'flex',alignItems:'center',gap:10}}>
 <img src="uploads/vxture-logo-white.png" alt="vxture" style={{height:44,width:44,objectFit:'contain'}} />
 <span style={{fontFamily:'Barlow, sans-serif',fontSize:36,fontWeight:800,letterSpacing:'0em',color:'var(--text-primary)',lineHeight:1,textTransform:'uppercase'}}>vxture</span>
 <span style={{fontFamily:'var(--font-ui)',fontSize:10,letterSpacing:'.1em',color:accent,background:`rgba(37,99,235,.08)`,border:`1px solid rgba(37,99,235,.15)`,borderRadius:4,padding:'2px 7px',marginLeft:4,textTransform:'uppercase',fontWeight:500}}>AI Platform</span>
 </div>
 </header>
 );
}

/* ─── Footer ──────────────────────────────────────── */
function Footer() {
 return (
 <footer style={{
 height:'var(--footer-h)', flexShrink:0,
 background:'transparent',
 borderTop:'none',
 display:'flex', alignItems:'center', justifyContent:'space-between',
 padding:'0 40px'}}>
 <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-muted)',letterSpacing:'.04em'}}>
 © 2026 vxture Inc. All rights reserved.
 </span>
 <div style={{display:'flex',gap:20}}>
 {['Privacy Policy','Terms of Service','Security','Status'].map(t=>(
 <a key={t} href="#" style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-muted)',textDecoration:'none',letterSpacing:'.04em',transition:'color .2s'}}
 onMouseEnter={e=>e.target.style.color='var(--accent)'}
 onMouseLeave={e=>e.target.style.color='var(--text-muted)'}
 >{t}</a>
 ))}
 </div>
 </footer>
 );
}

/* ─── Register Panel ─────────────────────────────── */
function RegisterPanel({ name, setName, email, setEmail, password, setPassword, confirmPw, setConfirmPw, errors, loading, accent, onSubmit, onBack }) {
 return (
 <div style={{ }}>
 <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--text-muted)',display:'flex',alignItems:'center',gap:5,marginBottom:24,padding:0,transition:'color .2s'}}
 onMouseEnter={e=>e.currentTarget.style.color=accent}
 onMouseLeave={e=>e.currentTarget.style.color='var(--text-muted)'}
 >← 返回登录</button>
 <div style={{marginBottom:24}}>
 <h2 style={{fontFamily:'var(--font-display)',fontSize:22,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>创建账号</h2>
 <p style={{fontSize:13,color:'var(--text-secondary)'}}>填写信息，开始使用 vxture</p>
 </div>
 <form onSubmit={onSubmit}>
 <Field label="姓名" type="text" placeholder="请输入您的姓名" value={name} onChange={setName} error={errors.name} autoFocus />
 <Field label="邮箱" type="email" placeholder="your@email.com" value={email} onChange={setEmail} error={errors.email} />
 <Field label="密码" type="password" placeholder="至少 8 位字符" value={password} onChange={setPassword} error={errors.password} hint="建议使用字母、数字、符号组合" />
 <Field label="确认密码" type="password" placeholder="再次输入密码" value={confirmPw} onChange={setConfirmPw} error={errors.confirmPw} />
 <PrimaryButton loading={loading} accent={accent} label="注册账号" loadingLabel="注册中…" />
 <p style={{fontSize:11,color:'var(--text-muted)',textAlign:'center',marginTop:16,lineHeight:1.7}}>
 注册即表示您同意{' '}
 <span style={{color:accent,cursor:'pointer'}}>服务条款</span>{' '}与{' '}
 <span style={{color:accent,cursor:'pointer'}}>隐私政策</span>
 </p>
 </form>
 </div>
 );
}

/* ─── Main App ────────────────────────────────────── */
function App() {
 const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
 const accent = tweaks.accentColor;

 const [screen, setScreen] = React.useState('login');
 const [email, setEmail] = React.useState('');
 const [password, setPassword] = React.useState('');
 const [name, setName] = React.useState('');
 const [confirmPw, setConfirmPw] = React.useState('');
 const [errors, setErrors] = React.useState({});
 const [showCaptcha, setShowCaptcha] = React.useState(false);
 const [loading, setLoading] = React.useState(false);
 const [showDash, setShowDash] = React.useState(false);

 function validate() {
 const e = {};
 if (!email.includes('@')) e.email = 'Enter a valid email address';
 if (password.length < 8) e.password = 'Min. 8 characters required';
 if (screen==='register') {
 if (!name.trim()) e.name = 'Display name is required';
 if (confirmPw!==password) e.confirmPw = 'Passwords do not match';
 }
 return e;
 }

 function handleSubmit(e) {
 e.preventDefault();
 const errs = validate();
 if (Object.keys(errs).length) { setErrors(errs); return; }
 setErrors({});
 setShowCaptcha(true);
 }

 function handleCaptchaSuccess() {
 setShowCaptcha(false);
 setLoading(true);
 setTimeout(()=>{ setLoading(false); setShowDash(true); }, 1400);
 }

 if (showDash) return (
 <Dashboard accent={accent} showNodeGraph={tweaks.showNodeGraph}
 onLogout={()=>{ setShowDash(false); setEmail(''); setPassword(''); }} />
 );

 const cardW = tweaks.cardWidth;
 const cardH = tweaks.cardHeight;

 /* ── Left panel: tech visual ── */
 const leftPanel = (
 <div style={{
 flex:'0 0 45%', position:'relative', overflow:'hidden',
 background:`linear-gradient(145deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%)`,
 display:'flex', flexDirection:'column', justifyContent:'space-between',
 padding:'40px 36px'}}>
 {tweaks.showNodeGraph && <NodeGraph accent="#93c5fd" />}

 {/* Subtle grid overlay */}
 <div style={{
 position:'absolute',inset:0,
 backgroundImage:`linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
 linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px)`,
 backgroundSize:'32px 32px',
 pointerEvents:'none'}} />
 {/* Bottom fade */}
 <div style={{position:'absolute',bottom:0,left:0,right:0,height:'40%',background:'linear-gradient(transparent,rgba(30,58,138,.6))',pointerEvents:'none'}} />

 {/* Scan line */}
 <div style={{position:'absolute',left:0,right:0,height:1,background:'linear-gradient(90deg,transparent,rgba(147,197,253,.3),transparent)',animation:'scanH 6s linear infinite',pointerEvents:'none'}} />

 {/* Top badge */}
 <div style={{position:'relative',zIndex:2}}>
 <div style={{
 display:'inline-flex',alignItems:'center',gap:6,
 background:'rgba(255,255,255,.1)',backdropFilter:'blur(8px)',
 border:'1px solid rgba(255,255,255,.18)',borderRadius:20,
 padding:'5px 12px'}}>
 <div style={{width:6,height:6,borderRadius:'50%',background:'#86efac',animation:'pulse 2s ease-in-out infinite'}} />
 <span style={{fontFamily:'var(--font-mono)',fontSize:10,color:'rgba(255,255,255,.85)',letterSpacing:'.1em'}}>ALL SYSTEMS OPERATIONAL</span>
 </div>
 </div>

 {/* Bottom copy */}
 <div style={{position:'relative',zIndex:2}}>
 <h2 style={{
 fontFamily:'var(--font-display)',fontSize:28,fontWeight:800,
 letterSpacing:'-.02em',color:'#fff',lineHeight:1.12,marginBottom:14, textWrap:'pretty'}}>
 Build intelligence<br/>into everything.
 </h2>
 <p style={{
 fontFamily:'var(--font-ui)',fontSize:13,color:'rgba(255,255,255,.65)',
 lineHeight:1.65,marginBottom:24}}>
 Orchestrate models, manage pipelines, and deploy AI workflows at scale — from a single workspace.
 </p>
 {/* Stats */}
 <div style={{display:'flex',gap:24}}>
 {[['40ms','avg latency'],['99.97%','uptime SLA'],['12B+','tokens/day']].map(([v,l])=>(
 <div key={l}>
 <div style={{fontFamily:'var(--font-mono)',fontSize:15,fontWeight:500,color:'#fff'}}>{v}</div>
 <div style={{fontFamily:'var(--font-mono)',fontSize:9,color:'rgba(255,255,255,.45)',letterSpacing:'.08em',marginTop:2}}>{l}</div>
 </div>
 ))}
 </div>
 </div>
 </div>
 );

 /* ── Right panel: form ── */
 const rightPanel = (
 <div style={{flex:'0 0 55%',display:'flex',flexDirection:'column',justifyContent:'center',padding:'36px 44px',background:'#fff',overflowY:'auto'}}>
 {screen==='forgot' ? (
 <ForgotScreen email={email} setEmail={setEmail} onBack={()=>{setScreen('login');setErrors({});}} accent={accent} />
 ) : screen==='register' ? (
 <RegisterPanel name={name} setName={setName} email={email} setEmail={setEmail}
 password={password} setPassword={setPassword} confirmPw={confirmPw} setConfirmPw={setConfirmPw}
 errors={errors} loading={loading} accent={accent} onSubmit={handleSubmit}
 onBack={()=>{setScreen('login');setErrors({});}} />
 ) : (
 <>
 <div style={{marginBottom:28}}>
 <h2 style={{fontFamily:'var(--font-display)',fontSize:22,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>欢迎回来</h2>
 <p style={{fontSize:13,color:'var(--text-secondary)'}}>登录您的 vxture 工作区</p>
 </div>
 <form onSubmit={handleSubmit} style={{ }}>
 <Field label="邮箱" type="email" placeholder="your@email.com" value={email} onChange={setEmail} error={errors.email} autoFocus />
 <Field label="密码" type="password" placeholder="请输入密码" value={password} onChange={setPassword} error={errors.password} />
 <div style={{textAlign:'right',marginTop:-10,marginBottom:18}}>
 <button type="button" onClick={()=>{setScreen('forgot');setErrors({});}}
 style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--text-muted)',transition:'color .2s'}}
 onMouseEnter={e=>e.target.style.color=accent} onMouseLeave={e=>e.target.style.color='var(--text-muted)'}>忘记密码？</button>
 </div>
 <PrimaryButton loading={loading} accent={accent} label="登录" loadingLabel="登录中…" />
 <div style={{display:'flex',alignItems:'center',gap:10,margin:'20px 0'}}>
 <div style={{flex:1,height:1,background:'var(--border)'}} />
 <span style={{fontSize:11,color:'var(--text-muted)'}}>其他方式登录</span>
 <div style={{flex:1,height:1,background:'var(--border)'}} />
 </div>
 <div style={{display:'flex',gap:8}}>
 {[
 {label:'微信',color:'#07C160',icon:<WechatIcon/>},
 {label:'钉钉',color:'#1677FF',icon:<DingTalkIcon/>},
 {label:'飞书',color:'#3370FF',icon:<FeishuIcon/>},
 ].map(({label,icon,color})=>(
 <button key={label} type="button" style={{flex:1,padding:'10px',background:'#f8faff',border:'1px solid var(--border)',borderRadius:7,color:'var(--text-secondary)',fontSize:12,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:5,transition:'all .2s'}}
 onMouseEnter={e=>{e.currentTarget.style.background='#f0f7ff';e.currentTarget.style.borderColor=color+'55';e.currentTarget.style.color=color;}}
 onMouseLeave={e=>{e.currentTarget.style.background='#f8faff';e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-secondary)';}}
 >{icon}{label}</button>
 ))}
 </div>
 <p style={{fontSize:13,color:'var(--text-secondary)',textAlign:'center',marginTop:24,lineHeight:1.7}}>
 还没有账号？{' '}
 <span onClick={()=>{setScreen('register');setErrors({});}} style={{color:accent,cursor:'pointer',fontWeight:500,textDecoration:'underline',textUnderlineOffset:3}}>注册账号</span>
 </p>
 </form>
 </>
 )}
 </div>
 );

 return (
 <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
 {showCaptcha && (
 <SliderCaptcha accent={accent} onSuccess={handleCaptchaSuccess} onClose={()=>setShowCaptcha(false)} />
 )}
 <Header accent={accent} />

 {/* Middle: centered card */}
 <main style={{
 flex:1, display:'flex', alignItems:'center', justifyContent:'center',
 overflow:'hidden', position:'relative',
 background:'transparent'}}>

 {/* The card */}
 <div style={{
 position:'relative', zIndex:2,
 width: '100%',
 maxWidth: cardW,
 height: cardH,
 display:'flex',
 borderRadius:16,
 overflow:'hidden',
 boxShadow:'0 20px 60px rgba(15,23,42,.12), 0 4px 16px rgba(37,99,235,.08)',
 border:'1px solid rgba(37,99,235,.1)',
 animation:'none'}}>
 {leftPanel}
 {/* Divider */}
 <div style={{width:1,background:'rgba(37,99,235,.1)',flexShrink:0}} />
 {rightPanel}
 </div>
 </main>

 <Footer />

 <TweaksPanel>
 <TweakSection label="Brand">
 <TweakColor label="Accent color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)} />
 <TweakToggle label="Node graph" value={tweaks.showNodeGraph} onChange={v=>setTweak('showNodeGraph',v)} />
 </TweakSection>
 <TweakSection label="Card size">
 <TweakSlider label="Width" value={tweaks.cardWidth} min={700} max={1200} step={20} unit="px" onChange={v=>setTweak('cardWidth',v)} />
 <TweakSlider label="Height" value={tweaks.cardHeight} min={400} max={720} step={10} unit="px" onChange={v=>setTweak('cardHeight',v)} />
 </TweakSection>
 </TweaksPanel>
 </div>
 );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
