# deploy/worker-01/compose.platform.yml
# 平台控制面（不含 nginx，nginx 由 compose.nginx.yml 独立管理）
# 服务器工作目录：/srv/vxture/repo/deploy/worker-01/
# 使用：docker compose -f compose.platform.yml up -d
#
# 前置：
#   1. bash scripts/setup-env.sh  （生成 secrets/platform.env、secrets/pg-password、.env、.env.*）
#   2. 手动补全 .env.* 中的 CHANGE_ME 字段（SMTP、OAuth 等服务专属密钥）

name: vx-platform

networks:
  vxture-prod:
    external: true   # nginx 容器已在此网络，平台服务加入即可互通

services:

  # ── 数据层 ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    container_name: vx-platform-pg
    restart: unless-stopped
    networks: [vxture-prod]
    environment:
      POSTGRES_USER: vxture
      POSTGRES_DB: platform_main
      POSTGRES_PASSWORD_FILE: /run/secrets/platform_pg_password
    secrets: [platform_pg_password]
    volumes:
      - /srv/vxture/data/platform-pg:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vxture -d platform_main"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: vx-platform-redis
    restart: unless-stopped
    networks: [vxture-prod]
    volumes:
      - /srv/vxture/data/platform-redis:/data
    command: >
      redis-server --appendonly yes
      --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 门户层 ──────────────────────────────────────────────────────────────────

  website:
    image: ghcr.io/vxture/website:latest
    container_name: vx-website
    restart: unless-stopped
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.vxture.com
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  console:
    image: ghcr.io/vxture/console:latest
    container_name: vx-console
    restart: unless-stopped
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.vxture.com
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin:
    image: ghcr.io/vxture/admin:latest
    container_name: vx-admin
    restart: unless-stopped
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.vxture.com
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 平台 BFF 层 ─────────────────────────────────────────────────────────────

  auth-bff:
    image: ghcr.io/vxture/bff-auth:latest
    container_name: vx-auth-bff
    restart: unless-stopped
    networks: [vxture-prod]
    ports:
      - "100.100.197.42:3090:3090"  # 绑定 Tailscale 接口，仅 Tailscale 对端可达
    env_file: [secrets/platform.env, .env.auth-bff]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway-bff:
    image: ghcr.io/vxture/bff-gateway:latest
    container_name: vx-gateway-bff
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: .env.gateway-bff
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  website-bff:
    image: ghcr.io/vxture/bff-website:latest
    container_name: vx-website-bff
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: [secrets/platform.env, .env.website-bff]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  ai-gateway:
    image: ghcr.io/vxture/service-ai-gateway:latest
    container_name: vx-ai-gateway
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: [secrets/platform.env, .env.ai-gateway]
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  console-bff:
    image: ghcr.io/vxture/bff-console:latest
    container_name: vx-console-bff
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: [secrets/platform.env, .env.console-bff]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
      ai-gateway: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3021/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin-bff:
    image: ghcr.io/vxture/bff-admin:latest
    container_name: vx-admin-bff
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: [secrets/platform.env, .env.admin-bff]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3031/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

secrets:
  platform_pg_password:
    file: ./secrets/pg-password
