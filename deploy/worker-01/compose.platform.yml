# deploy/worker-01/compose.platform.yml
# 平台控制面（不含 nginx，nginx 由 /data/compose/nginx/compose.yml 独立管理）
# 服务器工作目录：/data/compose/platform/
# 使用：docker compose -f compose.platform.yml up -d
#
# 前置：
#   1. cp .env.example .env  （填写 PLATFORM_REDIS_PASSWORD）
#   2. cp .env.*.example → .env.*  （填写各服务真实密钥）
#   3. echo 'password' > secrets/platform_pg_password.txt && chmod 600 secrets/platform_pg_password.txt

name: vx-platform

networks:
  vxture-prod:
    external: true   # nginx 容器已在此网络，平台服务加入即可互通

services:

  # ── 数据层 ──────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:18-alpine
    container_name: vx-platform-pg
    restart: unless-stopped
    networks: [vxture-prod]
    environment:
      POSTGRES_USER: vxture
      POSTGRES_DB: platform_main
      POSTGRES_PASSWORD_FILE: /run/secrets/platform_pg_password
    secrets: [platform_pg_password]
    volumes:
      - /data/vxtureworker01-platform-pg-main:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vxture -d platform_main"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: vx-platform-redis
    restart: unless-stopped
    networks: [vxture-prod]
    volumes:
      - /data/vxtureworker01-platform-redis-main/data:/data
    command: >
      redis-server --appendonly yes
      --requirepass "${PLATFORM_REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${PLATFORM_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 门户层 ──────────────────────────────────────────────────────────────────

  website:
    image: ghcr.io/vxture/website:latest
    container_name: vx-website
    restart: unless-stopped
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.vxture.com
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  console:
    image: ghcr.io/vxture/console:latest
    container_name: vx-console
    restart: unless-stopped
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.vxture.com
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin:
    image: ghcr.io/vxture/admin:latest
    container_name: vx-admin
    restart: unless-stopped
    networks: [vxture-prod]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.vxture.com
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── 平台 BFF 层 ─────────────────────────────────────────────────────────────

  auth-bff:
    image: ghcr.io/vxture/bff-auth:latest
    container_name: vx-auth-bff
    restart: unless-stopped
    networks: [vxture-prod]
    ports:
      - "100.100.197.42:3090:3090"  # 绑定 Tailscale 接口，仅 Tailscale 对端可达
    env_file: .env.auth-bff
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  gateway-bff:
    image: ghcr.io/vxture/bff-gateway:latest
    container_name: vx-gateway-bff
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: .env.gateway-bff
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  website-bff:
    image: ghcr.io/vxture/bff-website:latest
    container_name: vx-website-bff
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: .env.website-bff
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  console-bff:
    image: ghcr.io/vxture/bff-console:latest
    container_name: vx-console-bff
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: .env.console-bff
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3021/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin-bff:
    image: ghcr.io/vxture/bff-admin:latest
    container_name: vx-admin-bff
    restart: unless-stopped
    networks: [vxture-prod]
    env_file: .env.admin-bff
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      auth-bff: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3031/health"]
      interval: 30s
      timeout: 5s
      retries: 3

secrets:
  platform_pg_password:
    file: ./secrets/platform_pg_password.txt
