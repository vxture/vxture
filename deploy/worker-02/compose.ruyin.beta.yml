# deploy/worker-02/compose.ruyin.beta.yml
# Ruyin 灰度环境（bff:3114 + server:3115 + postgres + redis）
# 不对外暴露，绑定 127.0.0.1，仅 Tailscale SSH 访问
# 使用：docker compose -f compose.ruyin.beta.yml up -d
#
# 端口：NN=11（ruyin），X=4/5 用于 beta（prod 用 X=1/2）
# 须在 docs/ai/port-allocation.md agent 注册表中补录 beta 端口

name: vx-ruyin-beta

networks:
  vx-ruyin-beta:
    name: vx-ruyin-beta
    driver: bridge

services:

  postgres:
    image: postgres:17-alpine
    container_name: vx-ruyin-pg-beta
    restart: unless-stopped
    networks: [vx-ruyin-beta]
    environment:
      POSTGRES_USER: ruyin
      POSTGRES_DB: ruyin_beta
      POSTGRES_PASSWORD_FILE: /run/secrets/ruyin_beta_pg_password
    secrets: [ruyin_beta_pg_password]
    volumes:
      - /data/ruyin/beta/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruyin -d ruyin_beta"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: vx-ruyin-redis-beta
    restart: unless-stopped
    networks: [vx-ruyin-beta]
    volumes:
      - /data/ruyin/beta/redis:/data
    command: >
      redis-server --appendonly yes
      --requirepass "${RUYIN_BETA_REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${RUYIN_BETA_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ruyin-bff:
    image: ghcr.io/vxture/bff-ruyin:beta
    container_name: vx-ruyin-bff-beta
    restart: unless-stopped
    networks: [vx-ruyin-beta]
    ports:
      - "127.0.0.1:3114:3114"   # 内部，Tailscale SSH 转发访问
    env_file: .env.ruyin.beta.bff
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3114/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ruyin-server:
    image: ghcr.io/vxture/agent-ruyin:beta
    container_name: vx-ruyin-server-beta
    restart: unless-stopped
    networks: [vx-ruyin-beta]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3115:3115"
    env_file: .env.ruyin.beta.server
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3115/health"]
      interval: 30s
      timeout: 5s
      retries: 3

secrets:
  ruyin_beta_pg_password:
    file: ./secrets/ruyin_beta_pg_password.txt
