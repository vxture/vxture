# deploy/worker-02/compose.vela.beta.yml
# Vela 灰度环境（bff:3124 + server:3125 + postgres + redis）
# 不对外暴露，绑定 127.0.0.1，仅 Tailscale SSH 访问
# 使用：docker compose -f compose.vela.beta.yml up -d
#
# 端口：NN=12（vela），X=4/5 用于 beta（prod 用 X=1/2）
# 须在 docs/ai/port-allocation.md agent 注册表中补录 beta 端口

name: vx-vela-beta

networks:
  vx-vela-beta:
    name: vx-vela-beta
    driver: bridge

services:

  postgres:
    image: postgres:17-alpine
    container_name: vx-vela-pg-beta
    restart: unless-stopped
    networks: [vx-vela-beta]
    environment:
      POSTGRES_USER: vela
      POSTGRES_DB: vela_beta
      POSTGRES_PASSWORD_FILE: /run/secrets/vela_beta_pg_password
    secrets: [vela_beta_pg_password]
    volumes:
      - /data/vela/beta/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vela -d vela_beta"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: vx-vela-redis-beta
    restart: unless-stopped
    networks: [vx-vela-beta]
    volumes:
      - /data/vela/beta/redis:/data
    command: >
      redis-server --appendonly yes
      --requirepass "${VELA_BETA_REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${VELA_BETA_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  vela-bff:
    image: ghcr.io/vxture/bff-vela:beta
    container_name: vx-vela-bff-beta
    restart: unless-stopped
    networks: [vx-vela-beta]
    ports:
      - "0.0.0.0:3124:3124"   # UFW 限制仅 Tailscale 子网（100.64.0.0/10）可达
    env_file: .env.vela.beta.bff
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3124/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  vela-server:
    image: ghcr.io/vxture/agent-vela:beta
    container_name: vx-vela-server-beta
    restart: unless-stopped
    networks: [vx-vela-beta]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3125:3125"
    env_file: .env.vela.beta.server
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3125/health"]
      interval: 30s
      timeout: 5s
      retries: 3

secrets:
  vela_beta_pg_password:
    file: ./secrets/vela_beta_pg_password.txt
