<!DOCTYPE html>
<html data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Test</title>
    <style>
        /* 简单的CSS测试 */
        :root {
            --color-primary: #3b82f6;
            --color-on-primary: #ffffff;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: 0;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            background-color: var(--color-primary);
            color: var(--color-on-primary);
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-0.125rem);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: 0;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            background-color: var(--color-primary);
            color: var(--color-on-primary);
        }
    </style>
</head>
<body style="padding: 2rem;">
    <h1>CSS按钮测试</h1>
    <p>测试按钮样式是否正确应用：</p>
    <button class="btn">基础按钮</button>
    <button class="btn-primary">主要按钮</button>

    <script>
        console.log('CSS Test Page Loaded');
        console.log('Computed styles for .btn:', window.getComputedStyle(document.querySelector('.btn')));
    </script>
</body>
</html>
