# SonarQube Cloud Configuration
sonar.projectKey=vxture_vxture
sonar.organization=vx-6b309295f6500aba6b2a71a29ee27de77fa41583
sonar.host.url=https://sonarcloud.io

# Project information
sonar.projectName=Vxture
sonar.projectVersion=0.1.0

# Source configuration
sonar.sources=packages,portals,services,business
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/build/**,\
  **/dist/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/prisma/migrations/**,\
  **/prisma/seeds/**,\
  **/*seed*.sql

# Coverage: exclude services and packages that have no test harness yet
# services/ai/gateway is intentionally included — it has vitest coverage
sonar.coverage.exclusions=\
  services/commerce/**,\
  services/identity/**,\
  services/notification/**,\
  services/platform/**,\
  services/support/**,\
  services/tenant/**,\
  packages/**

# Language configuration
sonar.javascript.lcov.reportPaths=services/ai/gateway/coverage/lcov.info
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
