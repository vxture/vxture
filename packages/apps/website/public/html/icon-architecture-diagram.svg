<svg viewBox="0 0 720 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="720" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1f2328">Icon System Architecture</text>
  <text x="360" y="56" text-anchor="middle" font-size="12" fill="#636c76">@vxture/design-system</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- Layer 1: Business -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="76" width="660" height="90" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="50" y="97" font-size="10" font-weight="700" fill="#16a34a" letter-spacing="1">BUSINESS LAYER</text>
  <text x="50" y="116" font-size="13" font-weight="600" fill="#1f2328">website / app（任意业务包）</text>
  <text x="50" y="136" font-size="12" fill="#424950">只写：</text>
  <rect x="110" y="122" width="280" height="24" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="250" y="138" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d" font-family="monospace">&lt;Icon name="agent" size="lg" weight="duotone" /&gt;</text>
  <text x="430" y="136" font-size="12" fill="#636c76">← 只认这一个 import</text>
  <text x="50" y="156" font-size="11" fill="#636c76">import { Icon } from '@vxture/design-system'   ← 唯一入口，不直接碰 Phosphor</text>

  <!-- Arrow 1 -->
  <line x1="360" y1="166" x2="360" y2="192" stroke="#d0d7de" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="355,192 365,192 360,200" fill="#d0d7de"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- Layer 2: design-system — outer box -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="202" width="660" height="240" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="50" y="222" font-size="10" font-weight="700" fill="#2563eb" letter-spacing="1">DESIGN-SYSTEM LAYER　　packages/design-system/src/icons/</text>

  <!-- File: index.ts -->
  <rect x="50" y="232" width="130" height="58" rx="7" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="115" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">index.ts</text>
  <text x="115" y="267" text-anchor="middle" font-size="10" fill="#636c76">统一导出入口</text>
  <text x="115" y="281" text-anchor="middle" font-size="10" fill="#636c76">控制对外 API 面</text>

  <!-- File: types.ts -->
  <rect x="200" y="232" width="130" height="58" rx="7" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="265" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">types.ts</text>
  <text x="265" y="267" text-anchor="middle" font-size="10" fill="#636c76">IconName / IconProps</text>
  <text x="265" y="281" text-anchor="middle" font-size="10" fill="#636c76">IconSize / IconWeight</text>

  <!-- File: Icon.tsx — highlighted -->
  <rect x="350" y="228" width="150" height="66" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="425" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Icon.tsx</text>
  <text x="425" y="265" text-anchor="middle" font-size="10" fill="#1e40af">⭐ 对外唯一渲染组件</text>
  <text x="425" y="279" text-anchor="middle" font-size="10" fill="#1e40af">isValidIconName()</text>
  <text x="425" y="293" text-anchor="middle" font-size="10" fill="#1e40af">fallback 降级逻辑</text>

  <!-- File: iconMap.ts — highlighted -->
  <rect x="520" y="228" width="150" height="66" rx="7" fill="#fef9c3" stroke="#eab308" stroke-width="2"/>
  <text x="595" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">iconMap.ts</text>
  <text x="595" y="265" text-anchor="middle" font-size="10" fill="#854d0e">⭐ 唯一 import Phosphor</text>
  <text x="595" y="279" text-anchor="middle" font-size="10" fill="#854d0e">'agent' → Robot</text>
  <text x="595" y="293" text-anchor="middle" font-size="10" fill="#854d0e">'chart' → ChartBar ...</text>

  <!-- Internal arrows between files -->
  <!-- index → Icon -->
  <line x1="180" y1="261" x2="350" y2="261" stroke="#93c5fd" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="346,257 354,261 346,265" fill="#93c5fd"/>
  <!-- index → types -->
  <line x1="180" y1="255" x2="200" y2="255" stroke="#93c5fd" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="196,251 204,255 196,259" fill="#93c5fd"/>
  <!-- Icon → iconMap -->
  <line x1="500" y1="261" x2="520" y2="261" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="516,257 524,261 516,265" fill="#3b82f6"/>
  <!-- Icon → types (下方弯线) -->
  <path d="M425,294 Q425,320 265,320 Q200,320 200,290" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="196,286 200,294 204,286" fill="#93c5fd"/>

  <!-- Fallback box -->
  <rect x="50" y="322" width="600" height="100" rx="7" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="70" y="342" font-size="10" font-weight="700" fill="#636c76" letter-spacing="1">FALLBACK 机制（Icon.tsx 内部）</text>
  <!-- Step 1 -->
  <rect x="68" y="350" width="130" height="32" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="133" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">① 编译时</text>
  <text x="133" y="375" text-anchor="middle" font-size="10" fill="#15803d">TS 类型报错拦截</text>
  <!-- Arrow -->
  <line x1="198" y1="366" x2="218" y2="366" stroke="#d0d7de" stroke-width="1"/>
  <polygon points="215,362 223,366 215,370" fill="#d0d7de"/>
  <!-- Step 2 -->
  <rect x="220" y="350" width="130" height="32" rx="5" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="285" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">② 运行时</text>
  <text x="285" y="375" text-anchor="middle" font-size="10" fill="#854d0e">isValidIconName() 检测</text>
  <!-- Arrow -->
  <line x1="350" y1="366" x2="370" y2="366" stroke="#d0d7de" stroke-width="1"/>
  <polygon points="367,362 375,366 367,370" fill="#d0d7de"/>
  <!-- Step 3 -->
  <rect x="372" y="350" width="130" height="32" rx="5" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="437" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">③ fallback prop</text>
  <text x="437" y="375" text-anchor="middle" font-size="10" fill="#c2410c">降级到指定图标</text>
  <!-- Arrow -->
  <line x1="502" y1="366" x2="522" y2="366" stroke="#d0d7de" stroke-width="1"/>
  <polygon points="519,362 527,366 519,370" fill="#d0d7de"/>
  <!-- Step 4 -->
  <rect x="524" y="350" width="116" height="32" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="582" y="362" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">④ 兜底</text>
  <text x="582" y="375" text-anchor="middle" font-size="10" fill="#dc2626">placeholder 永不崩溃</text>

  <!-- Arrow 2: DS → Phosphor -->
  <line x1="360" y1="442" x2="360" y2="468" stroke="#d0d7de" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="355,468 365,468 360,476" fill="#d0d7de"/>
  <text x="395" y="460" font-size="11" fill="#636c76">仅 iconMap.ts 引用</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- Layer 3: Phosphor -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="30" y="478" width="660" height="72" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="50" y="498" font-size="10" font-weight="700" fill="#c2410c" letter-spacing="1">EXTERNAL LIBRARY</text>
  <text x="50" y="516" font-size="13" font-weight="600" fill="#1f2328">@phosphor-icons/react</text>
  <text x="50" y="534" font-size="12" fill="#636c76">1400+ SVG 图标组件，6种粗细（thin/light/regular/bold/fill/duotone）。业务层完全不感知此库。</text>

  <!-- Legend -->
  <rect x="30" y="558" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="48" y="569" font-size="11" fill="#636c76">核心文件</text>
  <rect x="120" y="558" width="12" height="12" rx="2" fill="#fef9c3" stroke="#eab308" stroke-width="1.5"/>
  <text x="138" y="569" font-size="11" fill="#636c76">唯一接触外部库的文件</text>
  <rect x="300" y="558" width="12" height="12" rx="2" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.2"/>
  <text x="318" y="569" font-size="11" fill="#636c76">内部文件（不对外导出）</text>
  <line x1="490" y1="564" x2="510" y2="564" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="507,560 515,564 507,568" fill="#3b82f6"/>
  <text x="520" y="569" font-size="11" fill="#636c76">内部调用</text>
  <line x1="590" y1="564" x2="610" y2="564" stroke="#d0d7de" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="607,560 615,564 607,568" fill="#d0d7de"/>
  <text x="620" y="569" font-size="11" fill="#636c76">类型引用</text>

</svg>
