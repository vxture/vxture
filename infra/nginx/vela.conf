# Vela BFF SSE route
#
# Include this location block in the server handling admin/console traffic.
# SSE requires buffering to be disabled so streamed assistant tokens reach the
# browser as they are emitted.

location /vela/ {
    proxy_pass         http://vela-bff:3121;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection '';
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 300s;
}
